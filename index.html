function build(picks){
  const byCap = {};
  for (const p of picks) (byCap[p.c] = byCap[p.c]||[]).push(p);
  const cappers = [];
  for (const name in byCap){
    const ps = byCap[name];
    let w=0,l=0,push=0,pend=0,staked=0,prof=0;
    const sportMap = {};
    for (const p of ps){
      if (p.r==='W') w++; else if (p.r==='L') l++; else if (p.r==='P') push++; else pend++;
      const sm = sportMap[p.s] = sportMap[p.s]||{w:0,l:0,n:0,staked:0,profit:0};
      sm.n++; if (p.r==='W') sm.w++; else if (p.r==='L') sm.l++;
      if (graded(p)){ staked+=p.u||1; prof+=profit(p); sm.staked+=p.u||1; sm.profit+=profit(p); }
    }
    const g = w+l;
    cappers.push({ name, picks:ps, w,l,push,pend, graded:g,
      winRate: g?w/g:0, staked, profit:prof, roi: staked?prof/staked:0, sportMap,
      topSport: Object.entries(sportMap).sort((a,b)=>b[1].n-a[1].n)[0]?.[0] || '—' });
  }
  const sportTotals = {};
  for (const p of picks) sportTotals[p.s] = (sportTotals[p.s]||0)+1;
  const major = Object.entries(sportTotals).filter(s=>s[1]>=20).sort((a,b)=>b[1]-a[1]).map(s=>s[0]).slice(0,6);
  const champs = [];
  for (const sport of major){
    let best=null;
    for (const c of cappers){
      const sm=c.sportMap[sport]; if(!sm) continue;
      const gg=sm.w+sm.l; if(gg<4) continue;
      const wr=gg?sm.w/gg:0;
      if(!best || wr>best.wr || (wr===best.wr && gg>best.g)) best={name:c.name,wr,g:gg,w:sm.w,l:sm.l};
    }
    if(best) champs.push({sport, ...best});
  }
  const dates = picks.map(p=>p.d).filter(Boolean).sort((a,b)=>{
    const pa=a.split('/'), pb=b.split('/');
    return new Date(pa[2],pa[0]-1,pa[1]) - new Date(pb[2],pb[0]-1,pb[1]);
  });
  const totalGraded = cappers.reduce((a,c)=>a+c.graded,0);
  const totalW = cappers.reduce((a,c)=>a+c.w,0);
  const ranked = cappers.filter(c=>c.graded>=8).slice().sort((a,b)=> b.winRate-a.winRate || b.graded-a.graded);
  const rankIndex = {}; ranked.forEach((c,i)=> rankIndex[c.name]=i+1);
  return { cappers, champs,
    sports: Object.keys(sportTotals).sort((a,b)=>sportTotals[b]-sportTotals[a]),
    dateMin: dates[0]||'', dateMax: dates[dates.length-1]||'',
    totalGraded, leagueWR: totalGraded?totalW/totalGraded:0,
    capCount: cappers.length, pickCount: picks.length, rankIndex };
}

function buildChart(c){
  const g = c.picks.filter(graded);
  if(!g.length) return null;
  const W=800,H=170,padX=4,padY=14;
  let cum=0; const series=[0];
  for(const p of g){ cum+=profit(p); series.push(cum); }
  const n=series.length-1;
  let yMin=Math.min(...series,0), yMax=Math.max(...series,0);
  if(yMax-yMin<1) yMax=yMin+1;
  const sx=i=>padX+(i/n)*(W-padX*2);
  const sy=v=>padY+(H-padY*2)*(yMax-v)/(yMax-yMin);
  const pts=series.map((v,i)=>sx(i).toFixed(1)+','+sy(v).toFixed(1));
  const end=series[series.length-1];
  const line=end>=0?'#16e08a':'#ff5468';
  const zeroY=sy(0);
  const area='M'+sx(0).toFixed(1)+','+zeroY.toFixed(1)+' L'+pts.join(' L')+' L'+sx(n).toFixed(1)+','+zeroY.toFixed(1)+' Z';
  return { vb:'0 0 '+W+' '+H, x0:padX, x1:W-padX, zeroY:zeroY.toFixed(1),
    points:pts.join(' '), area, areaFill: end>=0?'rgba(22,224,138,.10)':'rgba(255,84,104,.10)',
    line, dotX:sx(n).toFixed(1), dotY:sy(end).toFixed(1), endLabel:uStr(end) };
}

      </div>

        <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#5c6573;">${bigSub}</div>

  const spotlights = (byWr&&byRoi&&byUnits) ? [
    spotCard(byWr,'&#9670; HIGHEST WIN RATE','%','#16e08a',pct(byWr.winRate),'win','#16e08a',byWr.w+'&ndash;'+byWr.l+' record'),
    spotCard(byRoi,'&#9670; BEST ROI','$','#ffc24b',roiStr(byRoi.roi),'return',posColor(byRoi.roi),uStr(byRoi.profit)+' on '+byRoi.staked.toFixed(0)+'u'),
    spotCard(byUnits,'&#9670; MOST PROFITABLE','&#8599;','#3fb6ff',uStr(byUnits.profit),'units',posColor(byUnits.profit),pct(byUnits.winRate)+' &middot; '+byUnits.graded+' picks')
  ].join('') : '<div style="grid-column:1/-1;color:#5c6573;font-family:JetBrains Mono,monospace;font-size:12px;">Not enough graded picks yet for spotlights (need 8+ per capper).</div>';

  const champs = A.champs.map(c=>`
    <div class="ce-card ce-click" data-act="open" data-name="${esc(c.name)}" style="background:#12161c;border:1px solid #20262f;border-radius:12px;padding:14px;transition:all .15s;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:#8a94a3;margin-bottom:10px;">${esc(c.sport)}</div>

        <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:#16e08a;">${pct(c.wr)}</div>

    </div>`).join('');

  // rows
  const sf = ST.sportFilter, scoped = sf!=='All', minG = scoped?4:MIN;
  let list = A.cappers.filter(c=>{
    if(scoped){ const sm=c.sportMap[sf]; return sm && (sm.w+sm.l)>=minG; }
    return c.graded>=minG;
  });
  const metric = c => {
    if(!scoped) return {wr:c.winRate,w:c.w,l:c.l,roi:c.roi,units:c.profit,graded:c.graded,top:c.topSport};
    const sm=c.sportMap[sf]; const g=sm.w+sm.l;
    return {wr:g?sm.w/g:0,w:sm.w,l:sm.l,roi:sm.staked?sm.profit/sm.staked:0,units:sm.profit,graded:g,top:sf};
  };
  const q = ST.search.trim().toLowerCase();
  if(q) list = list.filter(c=>c.name.toLowerCase().includes(q));
  const key=ST.sortKey, dir=ST.sortDir;
  list = list.map(c=>({c, m:metric(c)}));
  list.sort((a,b)=>{
    if(key==='name'){ const av=a.c.name.toLowerCase(), bv=b.c.name.toLowerCase(); return av<bv?dir:av>bv?-dir:0; }
    const av=a.m[key], bv=b.m[key];
    if(av===bv) return b.m.graded-a.m.graded;
    return (av-bv)*dir;
  });
  const rowsHtml = list.map((o,i)=>{
    const c=o.c, m=o.m, rank=i+1;

    return `<div class="ce-row ce-click" data-act="open" data-name="${esc(c.name)}" style="display:grid;grid-template-columns:44px 1fr 96px 96px 92px 92px 110px;align-items:center;padding:13px 18px;border-bottom:1px solid #161b21;">

        <div style="width:32px;height:32px;border-radius:9px;background:${avBg(c.name)};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#0b0d10;flex:none;">${esc(mono(c.name))}</div>
        <div style="min-width:0;">
          <div style="font-weight:700;font-size:14px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.name)}</div>
          <div style="font-size:11px;color:#5c6573;">${esc(streak)}</div>
        </div>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:13px;text-align:right;color:#c4ccd6;">${m.w}&ndash;${m.l}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;text-align:right;color:#eef1f5;">${pct(m.wr)}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;text-align:right;color:${posColor(m.roi)};">${roiStr(m.roi)}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;text-align:right;color:${posColor(m.units)};">${uStr(m.units)}</div>
      <div style="text-align:right;"><span style="font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#8a94a3;background:#1a1f27;border:1px solid #242b34;border-radius:6px;padding:3px 8px;">${esc(m.top)}</span></div>
    </div>`;
  }).join('');

  const arrow = k => key===k ? (dir<0?'&#9660;':'&#9650;') : '';
  const sportOpts = ['All',...A.sports].map(o=>`<option value="${esc(o)}"${o===sf?' selected':''}>${esc(o)}</option>`).join('');
  const rowCountLabel = list.length + (scoped?' in '+sf:' ranked') + (q?' &middot; "'+esc(ST.search)+'"':'');

  return `<div style="max-width:1200px;margin:0 auto;padding:34px 30px 80px;">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:26px;">
      <div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#16e08a;letter-spacing:.18em;margin-bottom:8px;">LEADERBOARD</div>
        <h1 style="margin:0;font-size:42px;font-weight:900;letter-spacing:-.035em;line-height:1;">Who's actually winning</h1>
        <div style="margin-top:10px;color:#8a94a3;font-size:14.5px;max-width:520px;">Every figure below is computed from real graded picks.</div>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5c6573;text-align:right;line-height:1.7;">
        <div>WINDOW &middot; ${esc(A.dateMin)} &rarr; ${esc(A.dateMax)}</div>
        <div>LEAGUE HIT RATE &middot; <span style="color:#eef1f5;">${pct(A.leagueWR)}</span></div>
        <div>GRADED PICKS &middot; <span style="color:#eef1f5;">${A.totalGraded}</span></div>
      </div>
    </div>

    ${upcomingHtml()}

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:30px;">${spotlights}</div>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <div style="font-weight:800;font-size:15px;letter-spacing:-.01em;">Best by sport</div>
      <div style="flex:1;height:1px;background:#1e242c;"></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#5c6573;">TOP WIN RATE &middot; MIN 4 GRADED</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin-bottom:34px;">${champs||'<div style="grid-column:1/-1;color:#5c6573;font-family:JetBrains Mono,monospace;font-size:12px;">No sport has enough graded picks yet.</div>'}</div>

    <div style="background:#101419;border:1px solid #20262f;border-radius:16px;overflow:hidden;">

        <div style="position:relative;display:flex;align-items:center;">
          <span style="position:absolute;left:11px;color:#5c6573;font-size:13px;pointer-events:none;">&#8981;</span>

      </div>
      <div style="display:grid;grid-template-columns:44px 1fr 96px 96px 92px 92px 110px;align-items:center;padding:11px 18px;border-bottom:1px solid #1c222a;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:#5c6573;background:#0d1116;">
        <div>#</div>
        <div class="ce-click" data-act="sort" data-key="name">CAPPER ${arrow('name')}</div>
        <div class="ce-click" data-act="sort" data-key="graded" style="text-align:right;">RECORD ${arrow('graded')}</div>

}

function detailHtml(){
  const c = A.cappers.find(x=>x.name===ST.selected);
  if(!c) return '<div style="padding:40px;color:#8a94a3;">Capper not found.</div>';
  const rank = A.rankIndex[c.name];
  const tiles = [
    {label:'WIN RATE', value:pct(c.winRate), color:'#eef1f5', sub:c.w+' W &middot; '+c.l+' L'+(c.push?' &middot; '+c.push+' P':'')},
    {label:'ROI', value:roiStr(c.roi), color:posColor(c.roi), sub:'on '+c.staked.toFixed(0)+'u staked'},
    {label:'NET UNITS', value:uStr(c.profit), color:posColor(c.profit), sub:c.graded+' settled'},
    {label:'PICKS', value:String(c.picks.length), color:'#eef1f5', sub:(c.pend?c.pend+' pending':'all settled')}
  ].map(t=>`<div style="background:#12161c;border:1px solid #20262f;border-radius:13px;padding:17px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;color:#5c6573;margin-bottom:11px;">${t.label}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:27px;letter-spacing:-.03em;color:${t.color};">${t.value}</div>
      <div style="font-size:11.5px;color:#5c6573;margin-top:5px;">${t.sub}</div>
    </div>`).join('');

  const sportsArr = Object.entries(c.sportMap).sort((a,b)=>b[1].n-a[1].n);
  const bySport = sportsArr.map(([sport,sm])=>{
    const g=sm.w+sm.l, wr=g?sm.w/g:0;
    const barColor = wr>=0.55?'#16e08a':wr>=0.5?'#ffc24b':'#ff5468';
    return `<div style="margin-bottom:15px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
        <span style="font-size:12.5px;font-weight:600;">${esc(sport)}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#8a94a3;">${sm.w}&ndash;${sm.l} &middot; <span style="color:${posColor(wr-0.5)};">${g?pct(wr):'—'}</span></span>
      </div>
      <div style="height:6px;border-radius:3px;background:#1a1f27;overflow:hidden;">
        <div style="height:100%;width:${(g?wr*100:0).toFixed(0)}%;background:${barColor};border-radius:3px;"></div>
      </div>
    </div>`;
  }).join('');

  let hist = c.picks.slice();
  if(ST.detSport!=='All') hist = hist.filter(p=>p.s===ST.detSport);
  if(ST.detResult!=='All') hist = hist.filter(p=>{
    const r=ST.detResult;
    if(r==='Win') return p.r==='W'; if(r==='Loss') return p.r==='L';
    if(r==='Push') return p.r==='P'; if(r==='Pending') return p.r!=='W'&&p.r!=='L'&&p.r!=='P';
    return true;
  });
  const resMap = {W:{t:'WIN',c:'#16e08a',bg:'rgba(22,224,138,.12)'},L:{t:'LOSS',c:'#ff5468',bg:'rgba(255,84,104,.12)'},P:{t:'PUSH',c:'#ffc24b',bg:'rgba(255,194,75,.12)'}};
  const history = hist.map(p=>{
    const rm = resMap[p.r] || {t:'PEND',c:'#8a94a3',bg:'rgba(138,148,163,.12)'};
    const units = (p.u||1).toFixed((p.u%1)?2:0)+'u';
    const odds = p.o!=null ? (p.o>0?'+'+p.o:String(p.o)) : '—';
    return `<div style="display:grid;grid-template-columns:74px 70px 1fr 64px 54px 76px;align-items:center;padding:11px 18px;border-bottom:1px solid #14191f;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#8a94a3;">${esc(p.d?p.d.slice(0,5):'—')}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#8a94a3;">${esc(p.s)}</div>
      <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;">${esc(p.p||'—')}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;text-align:right;color:#c4ccd6;">${odds}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;text-align:right;color:#c4ccd6;">${units}</div>
      <div style="text-align:right;"><span style="font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;color:${rm.c};background:${rm.bg};border-radius:5px;padding:3px 8px;">${rm.t}</span></div>
    </div>`;
  }).join('');

  const ch = buildChart(c) || {vb:'0 0 800 170',points:'',area:'',areaFill:'none',line:'#16e08a',zeroY:85,x0:0,x1:800,dotX:0,dotY:85,endLabel:''};
  const detSportOpts = ['All',...Object.keys(c.sportMap)].map(o=>`<option value="${esc(o)}"${o===ST.detSport?' selected':''}>${esc(o)}</option>`).join('');
  const resultOpts = ['All','Win','Loss','Push','Pending'].map(o=>`<option value="${esc(o)}"${o===ST.detResult?' selected':''}>${esc(o)}</option>`).join('');
  const rankBadge = rank ? '#'+rank+' OVERALL' : 'UNRANKED &middot; <8 PICKS';
  const histCount = history ? (hist.length+(hist.length===1?' pick':' picks')) : '0 picks';

  return `<div style="max-width:1100px;margin:0 auto;padding:26px 30px 80px;">
    <div class="ce-back ce-click" data-act="board" style="display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#8a94a3;margin-bottom:22px;">&larr; BACK TO LEADERBOARD</div>

    <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:26px;">
      <div style="width:64px;height:64px;border-radius:16px;background:${avBg(c.name)};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;color:#0b0d10;flex:none;box-shadow:0 8px 26px rgba(0,0,0,.4);">${esc(mono(c.name))}</div>
      <div style="flex:1;min-width:200px;">
        <h1 style="margin:0;font-size:30px;font-weight:900;letter-spacing:-.03em;line-height:1;">${esc(c.name)}</h1>
        <div style="margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:12px;color:#8a94a3;">
          <span style="color:${rank&&rank<=3?'#16e08a':'#8a94a3'};">${rankBadge}</span>
          <span style="color:#3a4350;">&middot;</span>
          <span>${c.w}&ndash;${c.l}${c.push?'&ndash;'+c.push:''} record</span>
          <span style="color:#3a4350;">&middot;</span>
          <span>${sportsArr.length} sports</span>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;">${tiles}</div>

    <div style="background:#101419;border:1px solid #20262f;border-radius:16px;padding:20px;margin-bottom:24px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div style="font-weight:800;font-size:15px;letter-spacing:-.01em;">Bankroll curve</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#5c6573;">CUMULATIVE UNITS &middot; ${c.graded} GRADED PICKS</div>
      </div>
      <div style="font-size:12.5px;color:#8a94a3;margin-bottom:14px;">Running profit/loss in units across this capper's settled picks.</div>
      <svg viewBox="${ch.vb}" width="100%" height="190" preserveAspectRatio="none" style="display:block;overflow:visible;">
        <line x1="${ch.x0}" y1="${ch.zeroY}" x2="${ch.x1}" y2="${ch.zeroY}" stroke="#2a323d" stroke-width="1" stroke-dasharray="4 4"></line>

        <circle cx="${ch.dotX}" cy="${ch.dotY}" r="4.5" fill="${ch.line}"></circle>
      </svg>
      <div style="display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#3a4350;margin-top:6px;">
        <span>FIRST PICK</span><span>0u start &middot; ends ${ch.endLabel}</span><span>LATEST</span>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:start;">
      <div style="background:#101419;border:1px solid #20262f;border-radius:16px;padding:18px;">
        <div style="font-weight:800;font-size:14px;margin-bottom:16px;">By sport</div>
        ${bySport}
      </div>
      <div style="background:#101419;border:1px solid #20262f;border-radius:16px;overflow:hidden;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:15px 18px;border-bottom:1px solid #1c222a;">
          <div style="font-weight:800;font-size:14px;">Pick history</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#5c6573;">${histCount}</div>
          <div style="flex:1;"></div>
          <select data-field="detSport" style="background:#0b0d10;border:1px solid #242b34;border-radius:8px;color:#eef1f5;font-size:12.5px;padding:7px 10px;outline:none;cursor:pointer;">${detSportOpts}</select>
          <select data-field="detResult" style="background:#0b0d10;border:1px solid #242b34;border-radius:8px;color:#eef1f5;font-size:12.5px;padding:7px 10px;outline:none;cursor:pointer;">${resultOpts}</select>
        </div>
        <div style="display:grid;grid-template-columns:74px 70px 1fr 64px 54px 76px;align-items:center;padding:10px 18px;border-bottom:1px solid #1c222a;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.05em;color:#5c6573;background:#0d1116;">
          <div>DATE</div><div>SPORT</div><div>PICK</div><div style="text-align:right;">ODDS</div><div style="text-align:right;">UNITS</div><div style="text-align:right;">RESULT</div>
        </div>
        <div style="max-height:440px;overflow-y:auto;">${history||'<div style="padding:14px 18px;color:#3a4350;font-family:JetBrains Mono,monospace;font-size:11px;text-align:center;">No picks match those filters.</div>'}</div>
      </div>
    </div>
  </div>`;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = navHtml() + (ST.view==='detail' ? detailHtml() : boardHtml());
  if(ST._focusSearch){
    const s = document.getElementById('ce-search');
    if(s){ s.focus(); const v=s.value; s.setSelectionRange(v.length,v.length); }
    ST._focusSearch = false;
  }
}

// ---------- events (delegated) ----------
document.addEventListener('click', e=>{
  const t = e.target.closest('[data-act]');
  if(!t) return;
  const act = t.getAttribute('data-act');
  if(act==='board'){ ST.view='board'; window.scrollTo(0,0); render(); }
  else if(act==='open'){ ST.view='detail'; ST.selected=t.getAttribute('data-name'); ST.detSport='All'; ST.detResult='All'; window.scrollTo(0,0); render(); }
  else if(act==='sort'){
    const k=t.getAttribute('data-key');
    if(ST.sortKey===k) ST.sortDir=-ST.sortDir; else { ST.sortKey=k; ST.sortDir=-1; }
    render();
  }
});
document.addEventListener('input', e=>{
  const f = e.target.getAttribute && e.target.getAttribute('data-field');
  if(f==='search'){ ST.search=e.target.value; ST._focusSearch=true; render(); }
});
document.addEventListener('change', e=>{
  const f = e.target.getAttribute && e.target.getAttribute('data-field');
  if(!f) return;
  if(f==='sportFilter'){ ST.sportFilter=e.target.value; render(); }
  else if(f==='detSport'){ ST.detSport=e.target.value; render(); }
  else if(f==='detResult'){ ST.detResult=e.target.value; render(); }
});

A = build(PICKS);
render();
</script>
</body>
</html>
